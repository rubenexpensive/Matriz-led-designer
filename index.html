<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WS2812B Matrix Designer</title>
    <style>
        :root { --bg: #121212; --panel: #1e1e1e; --text: #ffffff; --accent: #00e676; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; padding: 10px; }
        .controls { background: var(--panel); padding: 15px; border-radius: 12px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .grid-wrapper { overflow-x: auto; background: #000; padding: 10px; border-radius: 8px; max-width: 95vw; border: 2px solid #333; }
        .grid { display: grid; grid-template-columns: repeat(32, 18px); grid-template-rows: repeat(8, 18px); gap: 2px; }
        .pixel { width: 18px; height: 18px; background: #222; border-radius: 2px; cursor: pointer; }
        textarea { width: 90%; max-width: 600px; height: 120px; margin-top: 15px; background: #000; color: var(--accent); border: 1px solid var(--accent); border-radius: 5px; font-family: monospace; font-size: 12px; padding: 10px; }
        button { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; background: var(--accent); color: #000; }
        button:active { transform: scale(0.95); }
        .btn-clear { background: #ff5252; color: white; }
        input[type="color"] { width: 40px; height: 40px; border: none; background: none; cursor: pointer; }
    </style>
</head>
<body>
    <h3>Diseñador WS2812B (8x32)</h3>
    <div class="controls">
        <input type="color" id="colorPicker" value="#00e676">
        <button onclick="generateCode()">Generar Código</button>
        <button class="btn-clear" onclick="clearGrid()">Limpiar</button>
    </div>
    <div class="grid-wrapper">
        <div id="grid" class="grid"></div>
    </div>
    <textarea id="output" readonly placeholder="El código C aparecerá aquí..."></textarea>
    <p style="font-size: 10px; color: #888;">Tip: Haz clic o arrastra para pintar</p>

    <script>
        const grid = document.getElementById('grid');
        const colorPicker = document.getElementById('colorPicker');
        const output = document.getElementById('output');
        let isDrawing = false;

        for (let i = 0; i < 256; i++) {
            const div = document.createElement('div');
            div.className = 'pixel';
            div.addEventListener('mousedown', () => { isDrawing = true; paint(div); });
            div.addEventListener('mouseover', () => { if(isDrawing) paint(div); });
            div.addEventListener('touchstart', (e) => { isDrawing = true; paint(div); e.preventDefault(); });
            div.addEventListener('touchmove', (e) => {
                if(isDrawing) {
                    const touch = e.touches[0];
                    const target = document.elementFromPoint(touch.clientX, touch.clientY);
                    if(target && target.className === 'pixel') paint(target);
                }
                e.preventDefault();
            }, {passive: false});
            grid.appendChild(div);
        }
        window.addEventListener('mouseup', () => isDrawing = false);
        window.addEventListener('touchend', () => isDrawing = false);

        function paint(el) { el.style.background = colorPicker.value; el.style.boxShadow = `0 0 5px ${colorPicker.value}`; }
        
        function clearGrid() { 
            document.querySelectorAll('.pixel').forEach(p => { p.style.background = '#222'; p.style.boxShadow = 'none'; });
            output.value = '';
        }

        function generateCode() {
            let hexs = Array.from(document.querySelectorAll('.pixel')).map(p => {
                let rgb = p.style.backgroundColor;
                if(!rgb || rgb === 'rgb(34, 34, 34)') return '0x000000';
                let res = rgb.match(/\d+/g).map(x => parseInt(x).toString(16).padStart(2, '0')).join('');
                return '0x' + res.toUpperCase();
            });
            output.value = `const uint32_t matriz[256] = {\n  ${hexs.join(', ')}\n};`;
        }
    </script>
</body>
</html>
