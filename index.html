<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IoT Matrix LED - Visual Horizontal</title>
    <style>
        :root { --bg: #121212; --panel: #1e1e1e; --accent: #2196F3; }
        body { font-family: sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; touch-action: none; }
        .toolbar { background: var(--panel); padding: 10px; border-radius: 10px; display: flex; gap: 10px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        /* CAMBIO VISUAL: Invertimos filas y columnas solo en el CSS */
        .grid { 
            display: grid; 
            /* Visualmente: 32 columnas y 8 filas */
            grid-template-columns: repeat(32, 22px); 
            grid-template-rows: repeat(8, 22px); 
            gap: 2px; 
            background: #000; 
            padding: 5px; 
            border: 1px solid #444;
            /* Opcional: Centrar si la pantalla es pequeña */
            overflow-x: auto;
            max-width: 95vw;
        }

        .pixel { width: 22px; height: 22px; background: #222; border-radius: 2px; }
        button { padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-send { background: #ff9800; color: black; }
        .btn-clear { background: #f44336; color: white; }
        .active { border: 2px solid white; }
    </style>
</head>
<body>

    <div class="toolbar">
        <input type="color" id="colorPicker" value="#00FF00">
        <button id="brushBtn" class="active" onclick="setTool('brush')">🖌️</button>
        <button id="eraserBtn" onclick="setTool('eraser')">🧽</button>
        <button class="btn-clear" onclick="clearGrid()">Limpiar</button>
        <button class="btn-send" id="btnSend">🚀 ENVIAR</button>
    </div>

    <div id="grid" class="grid"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCN598AmKYjlOfyiacikZCEUT-NuwCZkXk",
          authDomain: "matrix-led-8x32.firebaseapp.com",
          databaseURL: "https://matrix-led-8x32-default-rtdb.firebaseio.com",
          projectId: "matrix-led-8x32",
          storageBucket: "matrix-led-8x32.firebasestorage.app",
          messagingSenderId: "624915919354",
          appId: "1:624915919354:web:779fda6cefd0c669a6b443"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Mantenemos la lógica interna de 32 de largo y 8 de ancho
        const ROWS = 32, COLS = 8;
        let isDrawing = false;
        let currentTool = 'brush';
        let gridData = Array(ROWS * COLS).fill('000000');

        const gridEl = document.getElementById('grid');
        const colorPicker = document.getElementById('colorPicker');

        // Mantenemos el orden de creación para que el índice coincida con la lógica de envío
        for (let i = 0; i < ROWS * COLS; i++) {
            const div = document.createElement('div');
            div.className = 'pixel';
            div.dataset.index = i;
            div.addEventListener('mousedown', () => { isDrawing = true; paint(i, div); });
            div.addEventListener('mouseenter', () => { if(isDrawing) paint(i, div); });
            gridEl.appendChild(div);
        }

        window.setTool = (t) => {
            currentTool = t;
            document.getElementById('brushBtn').className = t === 'brush' ? 'active' : '';
            document.getElementById('eraserBtn').className = t === 'eraser' ? 'active' : '';
        };

        function paint(index, el) {
            const color = currentTool === 'brush' ? colorPicker.value : '#000000';
            const cleanColor = color.replace('#', '').toLowerCase();
            gridData[index] = cleanColor;
            el.style.backgroundColor = color === '#000000' ? '#222' : color;
        }

        window.clearGrid = () => {
            gridData.fill('000000');
            document.querySelectorAll('.pixel').forEach(p => p.style.backgroundColor = '#222');
        };

        document.getElementById('btnSend').onclick = async () => {
            const btn = document.getElementById('btnSend');
            btn.innerText = "⌛...";
            
            // LA LÓGICA DE ENVÍO SIGUE SIENDO LA MISMA (No se rompe)
            let zigzagData = [];
            for (let r = 0; r < ROWS; r++) {
                let row = gridData.slice(r * COLS, (r + 1) * COLS);
                if (r % 2 !== 0) row.reverse(); 
                zigzagData.push(...row);
            }

            try {
                await set(ref(db, 'matriz'), zigzagData.join(','));
                btn.innerText = "✅ OK";
                setTimeout(() => btn.innerText = "🚀 ENVIAR", 2000);
            } catch (e) {
                alert("Error: " + e.message);
                btn.innerText = "🚀 ENVIAR";
            }
        };

        window.addEventListener('mouseup', () => isDrawing = false);
        gridEl.addEventListener('touchmove', (e) => {
            const t = e.touches[0];
            const el = document.elementFromPoint(t.clientX, t.clientY);
            if(el && el.classList.contains('pixel')) {
                paint(parseInt(el.dataset.index), el);
            }
            e.preventDefault();
        }, {passive: false});
        gridEl.addEventListener('touchstart', (e) => isDrawing = true);
        gridEl.addEventListener('touchend', () => isDrawing = false);
    </script>
</body>
</html>
