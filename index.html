<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IoT Matrix LED - Horizontal View</title>
    <style>
        :root { --bg: #121212; --panel: #1e1e1e; --accent: #2196F3; }
        body { font-family: sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; touch-action: none; }
        .toolbar { background: var(--panel); padding: 10px; border-radius: 10px; display: flex; gap: 10px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        /* Visualmente: 32 columnas y 8 filas */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(32, 20px); 
            grid-template-rows: repeat(8, 20px); 
            gap: 2px; 
            background: #000; 
            padding: 5px; 
            border: 1px solid #444;
        }

        .pixel { width: 20px; height: 20px; background: #222; border-radius: 2px; }
        button { padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-send { background: #ff9800; color: black; }
        .btn-clear { background: #f44336; color: white; }
        .active { border: 2px solid white; }
    </style>
</head>
<body>

    <div class="toolbar">
        <input type="color" id="colorPicker" value="#00FF00">
        <button id="brushBtn" class="active" onclick="setTool('brush')">🖌️</button>
        <button id="eraserBtn" onclick="setTool('eraser')">🧽</button>
        <button class="btn-clear" onclick="clearGrid()">Limpiar</button>
        <button class="btn-send" id="btnSend">🚀 ENVIAR</button>
    </div>

    <div id="grid" class="grid"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCN598AmKYjlOfyiacikZCEUT-NuwCZkXk",
          authDomain: "matrix-led-8x32.firebaseapp.com",
          databaseURL: "https://matrix-led-8x32-default-rtdb.firebaseio.com",
          projectId: "matrix-led-8x32",
          storageBucket: "matrix-led-8x32.firebasestorage.app",
          messagingSenderId: "624915919354",
          appId: "1:624915919354:web:779fda6cefd0c669a6b443"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // FISICO: 32 filas, 8 columnas (Vertical)
        // WEB: 8 filas, 32 columnas (Horizontal)
        const PHY_ROWS = 32, PHY_COLS = 8;
        let gridData = Array(PHY_ROWS * PHY_COLS).fill('000000');

        let isDrawing = false;
        let currentTool = 'brush';
        const gridEl = document.getElementById('grid');
        const colorPicker = document.getElementById('colorPicker');

        // Crear la cuadrícula WEB (8 alto x 32 ancho)
        // r = fila en web (0-7), c = columna en web (0-31)
        for (let r = 0; r < PHY_COLS; r++) { 
            for (let c = 0; c < PHY_ROWS; c++) {
                const div = document.createElement('div');
                div.className = 'pixel';
                // Calculamos el índice físico: en la matriz vertical, 
                // lo que es una "columna" en la web es una "fila" en el LED.
                const index = (c * PHY_COLS) + r; 
                div.dataset.index = index;

                div.addEventListener('mousedown', () => { isDrawing = true; paint(index, div); });
                div.addEventListener('mouseenter', () => { if(isDrawing) paint(index, div); });
                gridEl.appendChild(div);
            }
        }

        window.setTool = (t) => {
            currentTool = t;
            document.getElementById('brushBtn').className = t === 'brush' ? 'active' : '';
            document.getElementById('eraserBtn').className = t === 'eraser' ? 'active' : '';
        };

        function paint(index, el) {
            const color = currentTool === 'brush' ? colorPicker.value : '#000000';
            gridData[index] = color.replace('#', '').toLowerCase();
            el.style.backgroundColor = color === '#000000' ? '#222' : color;
        }

        window.clearGrid = () => {
            gridData.fill('000000');
            document.querySelectorAll('.pixel').forEach(p => p.style.backgroundColor = '#222');
        };

        document.getElementById('btnSend').onclick = async () => {
            const btn = document.getElementById('btnSend');
            btn.innerText = "⌛...";
            
            // PROCESAR ZIGZAG FISICO (Cada 8 LEDs)
            let zigzagData = [];
            for (let r = 0; r < PHY_ROWS; r++) {
                let row = gridData.slice(r * PHY_COLS, (r + 1) * PHY_COLS);
                if (r % 2 !== 0) row.reverse(); // ZigZag físico
                zigzagData.push(...row);
            }

            try {
                await set(ref(db, 'matriz'), zigzagData.join(','));
                btn.innerText = "✅ OK";
                setTimeout(() => btn.innerText = "🚀 ENVIAR", 2000);
            } catch (e) {
                alert("Error: " + e.message);
                btn.innerText = "🚀 ENVIAR";
            }
        };

        window.addEventListener('mouseup', () => isDrawing = false);
        // Soporte Touch (Mapeo por coordenadas para que funcione en horizontal)
        gridEl.addEventListener('touchmove', (e) => {
            const t = e.touches[0];
            const el = document.elementFromPoint(t.clientX, t.clientY);
            if(el && el.classList.contains('pixel')) {
                paint(parseInt(el.dataset.index), el);
            }
            e.preventDefault();
        }, {passive: false});
        gridEl.addEventListener('touchstart', () => isDrawing = true);
        gridEl.addEventListener('touchend', () => isDrawing = false);
    </script>
</body>
</html>
